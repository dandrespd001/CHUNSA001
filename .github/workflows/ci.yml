# CI — matriz de determinismo (SPEC-001 §14; gates G1 local-CI + G2 entre SO/backends)
name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: gcc-nativo,     cc: gcc,   cxx: g++,     portable: "OFF" }
          - { name: clang-nativo,   cc: clang, cxx: clang++, portable: "OFF" }
          - { name: gcc-portable,   cc: gcc,   cxx: g++,     portable: "ON" }
          - { name: clang-portable, cc: clang, cxx: clang++, portable: "ON" }
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DCHUNSA_WIDE128_FORCE_PORTABLE=${{ matrix.portable }}
      - name: Build
        run: cmake --build build -j
      - name: Golden vectors
        run: ./build/chunsa_sim_cli golden --vectors tests/determinism/golden
      - name: Unit props
        run: ctest --test-dir build --output-on-failure
      - name: G1 (dos corridas bit-exactas)
        run: ./build/chunsa_sim_cli run --selftest-g1

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build (verifica intrinsics _mul128/_div128 — Anexo B.1)
        run: cmake --build build --config Release -j
      - name: Golden vectors
        run: ./build/Release/chunsa_sim_cli.exe golden --vectors tests/determinism/golden
      - name: Unit props
        run: ctest --test-dir build -C Release --output-on-failure
